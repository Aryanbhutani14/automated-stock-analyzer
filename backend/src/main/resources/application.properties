# ─── Application ─────────────────────────────────────────────────────
spring.application.name=automated-stock-analyzer
server.port=8080

# ─── Database ─────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stock_analyzer}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Email ────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── JWT ──────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:change-me-in-production-use-256-bit-key}
app.jwt.expiration-ms=86400000

# ─── External APIs ────────────────────────────────────────────────────
app.api.alpha-vantage.key=${ALPHA_VANTAGE_KEY}
app.api.twelve-data.key=${TWELVE_DATA_KEY}
app.api.openai.key=${OPENAI_API_KEY}

# ─── Scheduler ────────────────────────────────────────────────────────
# Fetch data every weekday at 6:30 PM IST (13:00 UTC)
app.scheduler.data-fetch-cron=0 0 13 * * MON-FRI

# ─── Actuator ─────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
