name: stock_analyzer
description: AI-powered stock screening and portfolio monitoring app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.1

  # Charts
  fl_chart: ^0.67.0

  # UI utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
